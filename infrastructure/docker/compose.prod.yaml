name: chronos

networks:
  backend:
    name: chronos_backend
  frontend:
    name: chronos_frontend

volumes:
  chronos_db:
  chronos_traefik_acme:
  chronos_traefik_dynamic:

services:
  db:
    image: postgres:18
    container_name: chronos_db
    networks:
      - backend
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql; data lands in /<major>/docker/.
      - chronos_db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: chronos_api:latest_stable
    container_name: chronos_api
    networks:
      - backend
      - frontend
    env_file:
      - .env.prod
    environment:
      ENV: ${ENV:-prod}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: ${COOKIE_SAMESITE}
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: chronos_worker:latest_stable
    container_name: chronos_worker
    networks:
      - backend
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JOB_POLL_INTERVAL_SECONDS: ${JOB_POLL_INTERVAL_SECONDS}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: chronos_frontend:latest_stable
    container_name: chronos_frontend
    networks:
      - frontend
    depends_on:
      - api
    restart: unless-stopped

  # Init container: expand ${PUBLIC_HOST} inside the Traefik dynamic config
  # template, drop the rendered YAML into a shared volume, then exit. Traefik
  # only starts after this service reports completed_successfully.
  traefik-config:
    image: alpine:3.19
    container_name: chronos_traefik_config
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?PUBLIC_HOST must be set in .env for prod (rejects requests with any other Host header)}
    volumes:
      - ./traefik/dynamic.prod:/templates:ro
      - chronos_traefik_dynamic:/rendered
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        apk add --no-cache gettext >/dev/null
        envsubst '$${PUBLIC_HOST}' \
          < /templates/services.yaml.template \
          > /rendered/services.yaml
        echo "rendered services.yaml for PUBLIC_HOST=$$PUBLIC_HOST"
    restart: "no"

  reverse-proxy:
    image: traefik:v3.2
    container_name: chronos_traefik
    networks:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.prod.yaml:/etc/traefik/traefik.yaml:ro
      - chronos_traefik_dynamic:/etc/traefik/dynamic:ro
      - chronos_traefik_acme:/acme
    command:
      # ACME (Let's Encrypt) cert resolver configured via CLI so values can come
      # from env. Flip ACME_CA_SERVER between staging and prod in .env.
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ACME_EMAIL must be set in .env for prod}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.caserver=${ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
    depends_on:
      traefik-config:
        condition: service_completed_successfully
    restart: unless-stopped
